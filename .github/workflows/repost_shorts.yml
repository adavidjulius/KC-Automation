name: 🎬 YouTube Shorts Auto Repost (From Drive)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  repost:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:

      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Fetch next video from Drive
        run: python fetch_from_drive.py
        env:
          YOUTUBE_ACCESS_TOKEN:  ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          DRIVE_FOLDER_ID:       ${{ secrets.DRIVE_FOLDER_ID }}

      - name: 🏁 Stop if no videos left
        if: env.NO_VIDEOS == 'true'
        run: |
          echo "✅ All Drive videos posted. Nothing left!"
          exit 0

      - name: ✅ Verify video.mp4 exists
        if: env.NO_VIDEOS != 'true'
        run: |
          ls -lh video.mp4
          echo "✅ File ready: ${{ env.NEXT_TITLE }}"

      - name: 📤 Upload to YouTube channel
        if: env.NO_VIDEOS != 'true'
        run: python upload.py
        env:
          YOUTUBE_ACCESS_TOKEN:  ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          VIDEO_TITLE:  ${{ env.NEXT_TITLE }}
          VIDEO_DESC:   "🤖 Auto posted via GitHub Actions #Shorts"
          PRIVACY:      "public"
          NEXT_ID:      ${{ env.NEXT_ID }}

      - name: 💾 Commit posted.json
        if: env.NO_VIDEOS != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json
          git diff --staged --quiet || git commit -m "✅ Posted: ${{ env.NEXT_TITLE }}"
          git push
