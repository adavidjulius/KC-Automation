name: 🎬 YouTube Shorts Auto Repost

on:
  # Run every 6 hours automatically
  schedule:
    - cron: '0 */6 * * *'

  # Also allow manual trigger
  workflow_dispatch:

jobs:
  repost:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write  # needed to commit posted.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch next unposted Short from source channel
        run: python fetch_shorts.py
        env:
          YOUTUBE_ACCESS_TOKEN: ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          SOURCE_CHANNEL_ID: ${{ secrets.SOURCE_CHANNEL_ID }}

      - name: Stop if no new Shorts found
        if: env.NO_SHORTS == 'true'
        run: |
          echo "✅ All Shorts already reposted. Nothing new to do."
          exit 0

      - name: Start bgutil PO Token server
        run: |
          python -m bgutil_ytdlp_pot_provider.server &
          echo "⏳ Waiting for PO token server..."
          sleep 5
          echo "✅ PO token server ready"

      - name: Download Short
        run: |
          yt-dlp \
            --extractor-args "youtube:player-client=mweb,default;getpot_bgutil_baseurl=http://localhost:4416" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            --no-playlist \
            --progress \
            -o "video.mp4" \
            "${{ env.NEXT_URL }}"

      - name: Verify download
        run: |
          ls -lh video.mp4
          echo "✅ Downloaded: ${{ env.NEXT_TITLE }}"

      - name: Upload Short to your channel
        run: python upload.py
        env:
          YOUTUBE_ACCESS_TOKEN: ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          VIDEO_TITLE: ${{ env.NEXT_TITLE }}
          VIDEO_DESC: "Auto reposted via GitHub Actions 🤖 #Shorts"
          PRIVACY: "public"
          NEXT_ID: ${{ env.NEXT_ID }}

      - name: Save posted.json back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json
          git commit -m "✅ Marked ${{ env.NEXT_ID }} as posted"
          git push
