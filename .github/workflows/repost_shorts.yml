name: 🎬 YouTube Shorts Auto Repost

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger anytime

jobs:
  repost:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      # ── 2. ffmpeg ──────────────────────────────────────────────────
      - name: 🎞️ Install ffmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      # ── 3. Python deps ─────────────────────────────────────────────
      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Fetch next Short ────────────────────────────────────────
      - name: 🔍 Fetch next unposted Short
        run: python fetch_shorts.py
        env:
          YOUTUBE_ACCESS_TOKEN:  ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          SOURCE_CHANNEL_ID:     ${{ secrets.SOURCE_CHANNEL_ID }}

      # ── 5. Stop if nothing new ─────────────────────────────────────
      - name: 🏁 Stop if all Shorts posted
        if: env.NO_SHORTS == 'true'
        run: |
          echo "✅ Nothing new to repost. Exiting cleanly."
          exit 0

      # ── 6. Start PO token server ───────────────────────────────────
      - name: 🔑 Start bgutil PO Token server
        if: env.NO_SHORTS != 'true'
        run: |
          python -m bgutil_ytdlp_pot_provider.server &
          sleep 5
          echo "✅ PO token server ready on port 4416"

      # ── 7. Download Short ──────────────────────────────────────────
      - name: ⬇️ Download Short via yt-dlp
        if: env.NO_SHORTS != 'true'
        run: |
          echo "📥 Downloading: ${{ env.NEXT_URL }}"

          yt-dlp \
            --extractor-args "youtube:player-client=mweb,default;getpot_bgutil_baseurl=http://localhost:4416" \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            --no-playlist \
            --no-part \
            --progress \
            --print after_move:filepath \
            -o "video.mp4" \
            "${{ env.NEXT_URL }}"

          # Rename if yt-dlp added extra extension
          if [ ! -f "video.mp4" ]; then
            FOUND=$(ls *.mp4 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "⚠️ Renaming $FOUND → video.mp4"
              mv "$FOUND" video.mp4
            else
              echo "❌ Download failed completely!"
              exit 1
            fi
          fi

          echo "✅ File ready:"
          ls -lh video.mp4


      # ── 8. Verify download ─────────────────────────────────────────
      - name: ✅ Verify downloaded file
        if: env.NO_SHORTS != 'true'
        run: |
          ls -lh video.mp4
          echo "Downloaded: ${{ env.NEXT_TITLE }}"

      # ── 9. Upload to channel ───────────────────────────────────────
      - name: 📤 Upload Short to YouTube channel
        if: env.NO_SHORTS != 'true'
        run: python upload.py
        env:
          YOUTUBE_ACCESS_TOKEN:  ${{ secrets.YOUTUBE_ACCESS_TOKEN }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          VIDEO_TITLE:  ${{ env.NEXT_TITLE }}
          VIDEO_DESC:   "Auto reposted via GitHub Actions 🤖 #Shorts"
          PRIVACY:      "public"
          NEXT_ID:      ${{ env.NEXT_ID }}

      # ── 10. Save posted.json back to repo ──────────────────────────
      - name: 💾 Commit posted.json
        if: env.NO_SHORTS != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json
          git commit -m "✅ Reposted Short: ${{ env.NEXT_ID }}"
          git push
